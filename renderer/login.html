<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Varel Admin</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
html, body {
  height:100%; overflow:hidden;
  font-family: Arial, sans-serif;
  background: #0f0c29;
  user-select: none;
  -webkit-app-region: drag;
}
body::before {
  content:'';
  position:absolute; inset:0;
  background: radial-gradient(ellipse 400px 300px at 50% 40%, rgba(83,74,183,0.25) 0%, transparent 70%);
  pointer-events:none;
}

/* ── LOGIN ── */
#login-view {
  height:100%;
  display:flex; align-items:center; justify-content:center;
  transition: opacity 0.35s ease;
}
.card {
  background:#1a1d27;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  padding:32px 28px;
  width:320px;
  -webkit-app-region: no-drag;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}
.logo { display:flex; align-items:center; gap:10px; margin-bottom:24px; }
.logo-mark {
  width:34px; height:34px; background:#534AB7;
  border-radius:8px;
  display:flex; align-items:center; justify-content:center;
}
.logo-name { font-size:15px; font-weight:800; color:white; }
.logo-sub  { font-size:9px; font-weight:700; color:#C9A84C; letter-spacing:2px; text-transform:uppercase; }
h1  { font-size:19px; font-weight:700; color:white; margin-bottom:3px; }
.sub{ font-size:12px; color:rgba(255,255,255,0.35); margin-bottom:20px; }
label {
  display:block; font-size:10px; font-weight:700;
  color:rgba(255,255,255,0.4); margin-bottom:5px;
  text-transform:uppercase; letter-spacing:1px;
}
input {
  width:100%; padding:10px 12px;
  background:rgba(255,255,255,0.06);
  border:1.5px solid rgba(255,255,255,0.1);
  border-radius:8px; color:white;
  font-size:14px; font-family:inherit; outline:none;
  transition:border-color .15s;
}
input:focus { border-color:#534AB7; }
input::placeholder { color:rgba(255,255,255,0.2); }
.error {
  background:rgba(232,122,122,0.1);
  border:1px solid rgba(232,122,122,0.25);
  border-radius:7px; padding:8px 12px;
  font-size:12px; color:#e87a7a;
  margin-bottom:10px; display:none;
}
.btn {
  width:100%; padding:11px; margin-top:10px;
  background:#534AB7; color:white; border:none;
  border-radius:8px; font-size:14px; font-weight:700;
  cursor:pointer; font-family:inherit;
  display:flex; align-items:center; justify-content:center; gap:8px;
  transition:background .15s;
}
.btn:hover { background:#4339a0; }
.btn:disabled { opacity:.6; cursor:not-allowed; }
.version { text-align:center; margin-top:16px; font-size:10px; color:rgba(255,255,255,0.15); }

/* ── LOADING ── */
#loading-view {
  position:fixed; inset:0;
  background:#0f0c29;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  opacity:0; pointer-events:none;
  transition:opacity .3s ease;
  z-index:100;
}
#loading-view.show { opacity:1; pointer-events:all; }
.ld-logo { display:flex; align-items:center; gap:10px; margin-bottom:32px; }
.ld-mark {
  width:42px; height:42px; background:#534AB7;
  border-radius:10px;
  display:flex; align-items:center; justify-content:center;
}
.ld-name { font-size:20px; font-weight:800; color:white; }
.ld-sub  { font-size:9px; font-weight:700; color:#C9A84C; letter-spacing:3px; text-transform:uppercase; }
.ld-text { font-size:12px; color:rgba(255,255,255,0.3); margin-bottom:20px; letter-spacing:.5px; }
.ld-track {
  width:180px; height:3px;
  background:rgba(255,255,255,0.08); border-radius:3px; overflow:hidden;
}
.ld-bar {
  height:100%; width:0; border-radius:3px;
  background:linear-gradient(90deg,#534AB7,#C9A84C);
  transition:none;
}

@keyframes spin { to { transform:rotate(360deg); } }

/* ── CUSTOM TITLEBAR ── */
.titlebar {
  position: fixed; top: 0; left: 0; right: 0;
  height: 32px;
  display: flex; align-items: center; justify-content: flex-end;
  padding: 0 8px;
  -webkit-app-region: drag;
  z-index: 9999;
}
.tb-btn {
  width: 28px; height: 28px; border-radius: 6px;
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  background: transparent;
  -webkit-app-region: no-drag;
  transition: background 0.15s;
  margin-left: 4px;
}
.tb-btn:hover { background: rgba(255,255,255,0.1); }
.tb-btn.close:hover { background: #e74c3c; }
.tb-btn svg { pointer-events: none; }
</style>
</head>
<body>

<!-- CUSTOM TITLEBAR -->
<div class="titlebar">
  <button class="tb-btn" onclick="window.electronAPI.minimize()" title="Minimize">
    <svg width="11" height="2" viewBox="0 0 11 2" fill="none"><rect width="11" height="1.5" rx=".75" fill="rgba(255,255,255,0.6)"/></svg>
  </button>
  <button class="tb-btn close" onclick="window.electronAPI.close()" title="Close">
    <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1 1l8 8M9 1L1 9" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linecap="round"/></svg>
  </button>
</div>

<!-- LOGIN VIEW -->
<div id="login-view">
  <div class="card">
    <div class="logo">
      <div class="logo-mark">
        <svg width="16" height="16" viewBox="0 0 22 22" fill="none">
          <path d="M11 2L20 18H2L11 2Z" fill="white" fill-opacity=".9"/>
          <path d="M11 7L16 18H6L11 7Z" fill="white" fill-opacity=".5"/>
        </svg>
      </div>
      <div>
        <div class="logo-name">VAREL</div>
        <div class="logo-sub">Energy Solutions</div>
      </div>
    </div>
    <h1>Admin Panel</h1>
    <div class="sub">Sign in to manage your store</div>
    <div class="error" id="err"></div>
    <label>Password</label>
    <input type="password" id="pw" placeholder="Enter admin password"
      onkeydown="if(event.key==='Enter')login()"/>
    <button class="btn" id="btn" onclick="login()">Sign In</button>
    <div class="version">Varel Admin · v1.0.0</div>
  </div>
</div>

<!-- LOADING VIEW -->
<div id="loading-view">
  <div class="ld-logo">
    <div class="ld-mark">
      <svg width="20" height="20" viewBox="0 0 22 22" fill="none">
        <path d="M11 2L20 18H2L11 2Z" fill="white" fill-opacity=".9"/>
        <path d="M11 7L16 18H6L11 7Z" fill="white" fill-opacity=".5"/>
      </svg>
    </div>
    <div>
      <div class="ld-name">VAREL</div>
      <div class="ld-sub">Energy Solutions</div>
    </div>
  </div>
  <div class="ld-text" id="ld-text">Loading admin panel...</div>
  <div class="ld-track"><div class="ld-bar" id="ld-bar"></div></div>
</div>

<script>
const PASS = 'Varel2025!';

async function login() {
  const pw  = document.getElementById('pw').value;
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');

  if (!pw) { err.textContent = 'Please enter your password'; err.style.display = 'block'; return; }
  err.style.display = 'none';
  btn.disabled = true;
  btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 16 16" fill="none" style="animation:spin .7s linear infinite"><circle cx="8" cy="8" r="6" stroke="rgba(255,255,255,0.25)" stroke-width="2"/><path d="M8 2a6 6 0 016 6" stroke="white" stroke-width="2" stroke-linecap="round"/></svg> Signing in...';

  await new Promise(r => setTimeout(r, 450));

  if (pw !== PASS) {
    err.textContent = 'Incorrect password. Please try again.';
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign In';
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
    return;
  }

  // ── Correct — show loading screen ──────────────────────
  document.getElementById('login-view').style.opacity = '0';
  await new Promise(r => setTimeout(r, 280));

  const lv  = document.getElementById('loading-view');
  const bar = document.getElementById('ld-bar');
  lv.classList.add('show');

  // Animate bar in steps
  const steps = [
    [200,  '35%',  'Connecting...'],
    [400,  '65%',  'Loading products...'],
    [400,  '85%',  'Almost ready...'],
    [300,  '100%', 'Done!'],
  ];
  for (const [delay, width, text] of steps) {
    await new Promise(r => setTimeout(r, delay));
    bar.style.transition = 'width 0.3s ease';
    bar.style.width = width;
    document.getElementById('ld-text').textContent = text;
  }

  await new Promise(r => setTimeout(r, 200));

  // Tell main process to open the big admin window
  if (window.electronAPI) {
    window.electronAPI.loginSuccess();
  }
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('pw').focus();
});
</script>
</body>
</html>
